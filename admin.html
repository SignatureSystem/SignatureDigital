<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Digital — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g:#25D366;--dg:#128C7E;--hdr:#075E54;--bg:#ECE5DD;--txt:#111;--sub:#667781;--bdr:#E9EDEF;--inp:#F0F2F5;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
#login-screen{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;}
#login-screen.hidden{display:none;}
.lbox{background:#fff;border-radius:14px;width:320px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.lhdr{background:var(--hdr);padding:22px 20px;text-align:center;}
.lhdr .logo{font-size:20px;font-weight:700;color:#fff;}
.lhdr .sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px;}
.lbody{padding:22px;}
.lbody input{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;font-family:inherit;}
.lbody input:focus{border-color:var(--dg);}
.lbtn{width:100%;padding:11px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.lbtn:hover{background:var(--dg);}
.lerr{color:#e53935;font-size:12px;text-align:center;margin-bottom:10px;min-height:16px;}
#hdr{background:var(--hdr);display:flex;align-items:center;padding:0 16px;height:56px;flex-shrink:0;position:sticky;top:0;z-index:10;}
.hname{font-size:16px;font-weight:600;color:#fff;flex:1;}
.hbadge{background:rgba(255,255,255,.2);color:#fff;font-size:12px;padding:4px 10px;border-radius:12px;}
.hlogout{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;margin-left:10px;}
.fmt-toolbar{display:flex;gap:6px;margin-bottom:8px;}
.fmt-btn{background:var(--inp);border:1.5px solid var(--bdr);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;color:var(--txt);font-family:inherit;transition:all .15s;line-height:1;}
.fmt-btn:hover{background:#e0e0e0;border-color:#aaa;}
.fmt-btn.active{background:var(--hdr);color:#fff;border-color:var(--hdr);}
.fmt-btn b{font-weight:700;}
.fmt-btn u{text-decoration:underline;}
.fmt-btn i{font-style:italic;}
#postbox{background:#fff;border-bottom:1px solid var(--bdr);padding:16px;position:sticky;top:56px;z-index:9;}
.post-inner{max-width:640px;margin:0 auto;}
.post-inner textarea{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;outline:none;resize:none;font-family:inherit;min-height:80px;transition:border-color .2s;}
.post-inner textarea:focus{border-color:var(--dg);}
.field-row{display:flex;gap:10px;margin-top:10px;}
.field-row input{flex:1;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;outline:none;font-family:inherit;min-width:0;transition:border-color .2s;}
.field-row input:focus{border-color:var(--dg);}
.post-actions{display:flex;align-items:center;gap:10px;margin-top:10px;}
.attach-lbl{cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);padding:8px 12px;border:1.5px solid var(--bdr);border-radius:8px;transition:all .2s;}
.attach-lbl:hover{border-color:var(--dg);color:var(--dg);}
.attach-lbl svg{width:16px;height:16px;fill:currentColor;}
.post-btn{margin-left:auto;padding:9px 22px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.post-btn:hover{background:var(--dg);}
.post-btn:disabled{background:#aaa;cursor:not-allowed;}
.prev-wrap{display:none;margin-top:10px;background:var(--inp);border-radius:8px;padding:8px 10px;}
.prev-inner{display:flex;align-items:center;gap:10px;}
.prev-inner img{max-height:70px;border-radius:6px;object-fit:cover;}
.prev-info{flex:1;min-width:0;}
.prev-name{font-size:12px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prev-size{font-size:11px;color:var(--sub);}
.prev-clear{background:none;border:none;cursor:pointer;color:#e53935;font-size:18px;}
#main{flex:1;max-width:640px;width:100%;margin:0 auto;padding:12px 12px 24px;}
.ucard{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px;position:relative;padding-top:44px;}
.card-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;}
.btn-del{background:#fee2e2;border:none;cursor:pointer;color:#e53935;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;}
.btn-del:hover{background:#fecaca;}
.btn-edit{background:#e0f0ff;border:none;cursor:pointer;color:#1a6fa8;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;}
.btn-edit:hover{background:#bee3f8;}
.umeta{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid rgba(0,0,0,.05);}
.ubadge{background:var(--g);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;}
.utime{font-size:11px;color:var(--sub);margin-left:auto;}
.utxt{font-size:14px;color:var(--txt);line-height:1.55;}
.uimg{width:100%;border-radius:8px;margin-bottom:10px;max-height:320px;object-fit:contain;background:#f5f5f5;display:block;pointer-events:none;}
.upd-btn-preview{display:inline-flex;margin-top:8px;padding:7px 18px;background:var(--g);color:#fff;border-radius:16px;font-size:12px;font-weight:600;text-decoration:none;}
.uviews{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:7px;border-top:1px solid rgba(0,0,0,.04);}
.uviews svg{width:13px;height:13px;fill:#bbb;}
.uviews span{font-size:11px;color:#bbb;}
#no-upd{text-align:center;padding:40px;color:var(--sub);font-size:14px;}
#edit-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;}
.ebox{background:#fff;border-radius:14px;width:500px;max-width:calc(100vw - 32px);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.ehdr{background:var(--hdr);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.ehdr p{color:#fff;font-size:15px;font-weight:600;}
.ehdr button{background:none;border:none;cursor:pointer;color:#fff;font-size:20px;}
.ebody{padding:18px;}
.ebody textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;outline:none;font-family:inherit;min-height:80px;resize:none;margin-bottom:10px;}
.ebody textarea:focus{border-color:var(--dg);}
.ebody .field-row{margin-bottom:14px;}
.ebtns{display:flex;gap:8px;justify-content:flex-end;}
.ebtns button{padding:9px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.ecancel{background:var(--inp);color:var(--txt);}
.esave{background:var(--g);color:#fff;}
.section-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.alert-panel{background:#fff;border-bottom:1px solid var(--bdr);padding:16px;}
.alert-inner{max-width:640px;margin:0 auto;}
.alert-row{display:flex;gap:10px;align-items:flex-end;margin-top:10px;}
.toggle-wrap{display:flex;align-items:center;gap:10px;margin-top:10px;}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.3s;}
.slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.slider{background:var(--g);}
.toggle input:checked+.slider:before{transform:translateX(20px);}
.toggle-lbl{font-size:13px;color:var(--txt);}
.alert-status{font-size:12px;color:var(--sub);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;border-radius:8px;padding:8px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lbox">
    <div class="lhdr"><div class="logo">Signature Digital</div><div class="sub">Admin Panel</div></div>
    <div class="lbody">
      <div class="lerr" id="lerr"></div>
      <input type="password" id="apwd" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <button class="lbtn" onclick="doAdminLogin()">Login</button>
    </div>
  </div>
</div>

<div id="edit-modal">
  <div class="ebox">
    <div class="ehdr">
      <p>Edit Update</p>
      <button onclick="closeEdit()">&#10005;</button>
    </div>
    <div class="ebody">
      <input type="hidden" id="edit-id">
      <div class="fmt-toolbar">
        <button class="fmt-btn" onclick="fmtEdit('bold')"><b>B</b></button>
        <button class="fmt-btn" onclick="fmtEdit('italic')"><i>I</i></button>
        <button class="fmt-btn" onclick="fmtEdit('underline')"><u>U</u></button>
        <button class="fmt-btn" onclick="fmtEdit('strikeThrough')"><s>S</s></button>
      </div>
      <div id="edit-txt" contenteditable="true" placeholder="Update text..." style="width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;outline:none;font-family:inherit;min-height:80px;resize:none;margin-bottom:10px;line-height:1.55;" onfocus="this.style.borderColor='var(--dg)'" onblur="this.style.borderColor='var(--bdr)'"></div>
      <div class="field-row">
        <input type="text" id="edit-btn-label" placeholder="Button label (e.g. Buy Now)">
        <input type="url" id="edit-btn-url" placeholder="Button URL (e.g. https://wa.me/...)">
      </div>
      <div class="ebtns">
        <button class="ecancel" onclick="closeEdit()">Cancel</button>
        <button class="esave" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<div id="hdr">
  <div class="hname">Signature Digital — Admin</div>
  <span class="hbadge">Admin</span>
  <button class="hlogout" onclick="doLogout()">Logout</button>
</div>

<div id="postbox">
  <div class="post-inner">
    <div class="fmt-toolbar">
      <button class="fmt-btn" onclick="fmt('bold')" title="Bold"><b>B</b></button>
      <button class="fmt-btn" onclick="fmt('italic')" title="Italic"><i>I</i></button>
      <button class="fmt-btn" onclick="fmt('underline')" title="Underline"><u>U</u></button>
      <button class="fmt-btn" onclick="fmt('strikeThrough')" title="Strikethrough"><s>S</s></button>
    </div>
    <div id="post-txt" contenteditable="true" placeholder="Write an update for your clients..." style="width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;outline:none;font-family:inherit;min-height:80px;transition:border-color .2s;line-height:1.55;" onfocus="this.style.borderColor='var(--dg)'" onblur="this.style.borderColor='var(--bdr)'"></div>
    <div class="field-row">
      <input type="text" id="btn-label" placeholder="Button label (e.g. Buy Now) — optional">
      <input type="url" id="btn-url" placeholder="Button URL — optional">
    </div>
    <div class="prev-wrap" id="prev-wrap">
      <div class="prev-inner">
        <img id="prev-img" src="">
        <div class="prev-info">
          <div class="prev-name" id="prev-name"></div>
          <div class="prev-size" id="prev-size"></div>
        </div>
        <button class="prev-clear" onclick="clearImg()">&#10005;</button>
      </div>
    </div>
    <div class="post-actions">
      <label class="attach-lbl">
        <input type="file" id="img-inp" accept="image/*" style="display:none" onchange="prevImg(this)">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        Attach Image
      </label>
      <button class="post-btn" id="post-btn" onclick="postUpdate()">Post Update</button>
    </div>
  </div>
</div>

<div class="alert-panel">
  <div class="alert-inner">
    <div class="section-title">Alert Popup</div>
    <textarea id="alert-msg" placeholder="Alert message shown to visitors..." style="width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;outline:none;font-family:inherit;resize:none;min-height:60px;transition:border-color .2s;" oninput="autoResize(this)"></textarea>
    <div class="alert-row">
      <input type="text" id="alert-btn-label" placeholder="Button label (optional)" style="flex:1;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;outline:none;font-family:inherit;">
      <input type="url" id="alert-btn-url" placeholder="Button URL (optional)" style="flex:2;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;outline:none;font-family:inherit;">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;">
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="alert-enabled" onchange="saveAlert()">
          <span class="slider"></span>
        </label>
        <span class="toggle-lbl">Show alert to visitors</span>
      </div>
      <button onclick="saveAlert()" style="padding:8px 18px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Save Alert</button>
    </div>
    <p class="alert-status" id="alert-status"></p>
  </div>
</div>
<div id="main">
  <div id="updlist"></div>
  <div id="no-upd" style="display:none;">No updates yet.</div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SB_URL = 'https://gufqzzhwgrxrjwyhqnki.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZnF6emh3Z3J4cmp3eWhxbmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTk5MDAsImV4cCI6MjA5NTAzNTkwMH0.Elfpdw9TnTNT7g8yn8HFLpxcry7bjkEZTeUlOZxuhC4';
var sb = supabase.createClient(SB_URL, SB_KEY);
var imgFile = null;

async function doAdminLogin() {
  var pwd = document.getElementById('apwd').value.trim();
  if (!pwd) return;
  var btn = document.querySelector('.lbtn');
  btn.textContent = 'Verifying...'; btn.disabled = true;
  try {
    var r = await sb.from('admin_config').select('value').eq('key','admin_pwd_hash').single();
    if (r.error || !r.data) { document.getElementById('lerr').textContent = 'Config error'; return; }
    var parts = r.data.value.split(':');
    var enc = new TextEncoder();
    var buf = await crypto.subtle.digest('SHA-256', enc.encode(parts[0] + pwd));
    var hex = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    if (hex === parts[1]) {
      localStorage.setItem('sgd_admin','1');
      document.getElementById('login-screen').classList.add('hidden');
      loadUpdates();
loadAlertConfig();
    } else {
      document.getElementById('lerr').textContent = 'Incorrect password';
    }
  } catch(e) { document.getElementById('lerr').textContent = 'Something went wrong.'; }
  btn.textContent = 'Login'; btn.disabled = false;
}

function doLogout() { localStorage.removeItem('sgd_admin'); location.reload(); }

if (localStorage.getItem('sgd_admin') === '1') {
  document.getElementById('login-screen').classList.add('hidden');
}

function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(d) { var now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),yest=new Date(today-86400000),md=new Date(d.getFullYear(),d.getMonth(),d.getDate()),t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); if(md.getTime()===today.getTime()) return t; if(md.getTime()===yest.getTime()) return 'Yesterday '+t; return d.toLocaleDateString()+' '+t; }
function fmtSize(b) { if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function showToast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2500); }

function prevImg(inp) {
  if (!inp.files[0]) return;
  imgFile = inp.files[0];
  document.getElementById('prev-img').src = URL.createObjectURL(imgFile);
  document.getElementById('prev-name').textContent = imgFile.name;
  document.getElementById('prev-size').textContent = fmtSize(imgFile.size);
  document.getElementById('prev-wrap').style.cssText = 'display:block!important;';
}
function clearImg() { imgFile=null; document.getElementById('img-inp').value=''; document.getElementById('prev-wrap').style.cssText='display:none!important;'; }

async function uploadImg(file) {
  var ext = file.name.split('.').pop();
  var path = Date.now()+'-'+Math.random().toString(36).slice(2)+'.'+ext;
  var r = await sb.storage.from('update-images').upload(path, file, {contentType:file.type});
  if (r.error) throw r.error;
  return sb.storage.from('update-images').getPublicUrl(path).data.publicUrl;
}

async function postUpdate() {
  var txt = document.getElementById('post-txt').innerHTML.trim();
  var btnLabel = document.getElementById('btn-label').value.trim();
  var btnUrl = document.getElementById('btn-url').value.trim();
  var imgUrl = null;
  if (!txt && !imgFile) return showToast('Write something first');
  var btn = document.getElementById('post-btn');
  btn.disabled = true; btn.textContent = 'Posting...';
  try {
    if (imgFile) { imgUrl = await uploadImg(imgFile); clearImg(); }
    var r = await sb.from('updates').insert({text:txt||'', image_url:imgUrl, views:0, btn_label:btnLabel||null, btn_url:btnUrl||null});
    if (r.error) throw r.error;
    document.getElementById('post-txt').innerHTML = '';
    document.getElementById('btn-label').value = '';
    document.getElementById('btn-url').value = '';
    showToast('Update posted!');
    loadUpdates();
  } catch(e) { showToast('Error: '+e.message); }
  btn.disabled = false; btn.textContent = 'Post Update';
}

var editingId = null;
function handleEdit(btn) {
  var card = btn.closest('.ucard');
  var u = card._data || {};
  openEdit(card.dataset.id, u.text||'', u.btn_label||'', u.btn_url||'');
}
function openEdit(id, txt, btnLabel, btnUrl) {
  editingId = id;
  document.getElementById('edit-txt').innerHTML = txt || '';
  document.getElementById('edit-btn-label').value = btnLabel || '';
  document.getElementById('edit-btn-url').value = btnUrl || '';
  document.getElementById('edit-modal').style.display = 'flex';
}
function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; editingId = null; }

async function saveEdit() {
  if (!editingId) return;
  var txt = document.getElementById('edit-txt').innerHTML.trim();
  var btnLabel = document.getElementById('edit-btn-label').value.trim();
  var btnUrl = document.getElementById('edit-btn-url').value.trim();
  try {
    await sb.from('updates').update({text:txt, btn_label:btnLabel||null, btn_url:btnUrl||null}).eq('id', editingId);
    closeEdit(); showToast('Saved!'); loadUpdates();
  } catch(e) { showToast('Error saving'); }
}

async function deleteUpdate(id) {
  if (!confirm('Delete this update?')) return;
  try { await sb.from('updates').delete().eq('id', id); showToast('Deleted'); loadUpdates(); }
  catch(e) { showToast('Error deleting'); }
}

async function loadUpdates() {
  try {
    var r = await sb.from('updates').select('*').order('created_at',{ascending:false}).limit(50);
    var list = document.getElementById('updlist'), none = document.getElementById('no-upd');
    if (!r.data || !r.data.length) { list.innerHTML=''; none.style.display=''; return; }
    none.style.display = 'none';
    list.innerHTML = r.data.map(function(u) {
      var id = u.id;
      return '<div class="ucard" data-id="'+id+'">'+
        '<div class="card-actions">'+
          '<button class="btn-edit" data-id="'+id+'" onclick="handleEdit(this)">Edit</button>'+
          '<button class="btn-del" data-id="'+id+'" onclick="deleteUpdate(this.dataset.id)">Delete</button>'+
        '</div>'+
        '<div class="umeta"><span class="ubadge">UPDATE</span><span class="utime">'+fmtTime(new Date(u.created_at))+'</span></div>'+
        (u.image_url?'<img class="uimg" src="'+u.image_url+'" style="pointer-events:none;">':'')+
        (u.text?'<div class="utxt">'+esc(u.text)+'</div>':'')+
        (u.btn_label&&u.btn_url?'<a class="upd-btn-preview" href="'+u.btn_url+'" target="_blank">'+esc(u.btn_label)+'</a>':'')+
        '<div class="uviews"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg><span>'+(u.views||0)+' views</span></div>'+
      '</div>';
    }).join('');
    // Store full data on each card element
    r.data.forEach(function(u) {
      var card = list.querySelector('[data-id="'+u.id+'"]');
      if (card) { card._data = u; }
    });
  } catch(e) { showToast('Failed to load'); }
}

async function loadAlertConfig(){
  try{
    var r=await sb.from('site_config').select('value').eq('key','alert').single();
    if(!r.data) return;
    var cfg=JSON.parse(r.data.value);
    document.getElementById('alert-msg').value=cfg.message||'';
    document.getElementById('alert-btn-label').value=cfg.btn_label||'';
    document.getElementById('alert-btn-url').value=cfg.btn_url||'';
    document.getElementById('alert-enabled').checked=cfg.enabled||false;
    document.getElementById('alert-status').textContent=cfg.enabled?'Alert is currently active':'Alert is disabled';
  }catch(e){}
}

async function saveAlert(){
  var msg=document.getElementById('alert-msg').value.trim();
  var btnLabel=document.getElementById('alert-btn-label').value.trim();
  var btnUrl=document.getElementById('alert-btn-url').value.trim();
  var enabled=document.getElementById('alert-enabled').checked;
  var cfg={message:msg,btn_label:btnLabel||null,btn_url:btnUrl||null,enabled:enabled};
  try{
    await sb.from('site_config').upsert({key:'alert',value:JSON.stringify(cfg)});
    document.getElementById('alert-status').textContent=enabled?'Alert is now active':'Alert is disabled';
    showToast(enabled?'Alert enabled!':'Alert disabled');
  }catch(e){ showToast('Error saving alert'); }
}

function autoResize(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

function fmt(cmd) {
  document.getElementById('post-txt').focus();
  document.execCommand(cmd, false, null);
}
function fmtEdit(cmd) {
  document.getElementById('edit-txt').focus();
  document.execCommand(cmd, false, null);
}
document.getElementById('post-txt').addEventListener('keydown', function(e) {
  if (e.key==='Enter' && e.ctrlKey) { e.preventDefault(); postUpdate(); }
  if (e.key==='Enter' && !e.ctrlKey && !e.shiftKey) { e.preventDefault(); document.execCommand('insertHTML', false, '<br>'); }
});

loadUpdates();
</script>
