<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Signature Digital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g:#25D366;--dg:#128C7E;--hdr:#075E54;--bg:#ECE5DD;--txt:#111;--sub:#667781;--bdr:#E9EDEF;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
#hdr{background:var(--hdr);display:flex;align-items:center;padding:0 16px;height:58px;flex-shrink:0;position:sticky;top:0;z-index:10;}
.hav{width:40px;height:40px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;margin-right:12px;flex-shrink:0;}
.hname{font-size:16px;font-weight:600;color:#fff;}
.hsub{font-size:12px;color:rgba(255,255,255,.65);}

/* UPDATES */
#main{flex:1;max-width:640px;width:100%;margin:0 auto;padding:12px 12px 24px;}
.ucard{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px;}
.umeta{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid rgba(0,0,0,.05);}
.ubadge{background:var(--g);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;flex-shrink:0;}
.uauthor{font-size:12px;font-weight:600;color:var(--g);}
.udot{color:rgba(0,0,0,.25);font-size:12px;}
.uphone{font-size:11px;color:rgba(0,0,0,.35);}
.utime{font-size:11px;color:var(--sub);margin-left:auto;flex-shrink:0;}
.utxt{font-size:14px;color:var(--txt);line-height:1.55;}
.uimg{width:100%;border-radius:8px;margin-top:10px;max-height:320px;object-fit:contain;background:#f5f5f5;cursor:pointer;display:block;}
.uviews{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:7px;border-top:1px solid rgba(0,0,0,.04);}
.uviews svg{width:13px;height:13px;fill:#bbb;}
.uviews span{font-size:11px;color:#bbb;}
#no-upd{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px;}
#loading{text-align:center;padding:40px;color:var(--sub);font-size:14px;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;border-radius:8px;padding:8px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="hdr">
  <div class="hav">SD</div>
  <div>
    <div class="hname">Signature Digital</div>
    <div class="hsub">Genuine Softwares at Affordable Prices</div>
  </div>
</div>

<div id="main">
  <div id="loading">Loading updates...</div>
  <div id="updlist"></div>
  <div id="no-upd" style="display:none;">No updates yet. Check back soon!</div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://gufqzzhwgrxrjwyhqnki.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZnF6emh3Z3J4cmp3eWhxbmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTk5MDAsImV4cCI6MjA5NTAzNTkwMH0.Elfpdw9TnTNT7g8yn8HFLpxcry7bjkEZTeUlOZxuhC4';
const sb = supabase.createClient(SB_URL, SB_KEY);

function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function fmtTime(d){
  var now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var yest=new Date(today-86400000), md=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(md.getTime()===today.getTime()) return t;
  if(md.getTime()===yest.getTime()) return 'Yesterday '+t;
  return d.toLocaleDateString()+' '+t;
}
function fmtSize(b){ if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2500); }

async function loadUpdates(){
  try{
    var r = await sb.from('updates').select('*').order('created_at',{ascending:false}).limit(50);
    document.getElementById('loading').style.display='none';
    var list=document.getElementById('updlist'), none=document.getElementById('no-upd');
    if(!r.data||!r.data.length){ none.style.display=''; return; }
    none.style.display='none';
    list.innerHTML = r.data.map(function(u){
      return '<div class="ucard">'+
        '<div class="umeta">'+
          '<span class="ubadge">UPDATE</span>'+
          '<span class="uauthor">Signature Digital</span>'+
          '<span class="udot">&#183;</span>'+
          '<span class="uphone">077 831 5058</span>'+
          '<span class="utime">'+fmtTime(new Date(u.created_at))+'</span>'+
        '</div>'+
        '<div class="utxt">'+esc(u.text)+'</div>'+
        (u.image_url?'<img class="uimg" src="'+u.image_url+'" onclick="window.open(\''+u.image_url+'\',\'_blank\')" alt="update image">':'')+
        '<div class="uviews">'+
          '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'+
          '<span id="vc-'+u.id+'">'+(u.views||0)+'</span>'+
        '</div>'+
      '</div>';
    }).join('');
    r.data.forEach(function(u){ trackView(u.id); });
  }catch(e){ document.getElementById('loading').textContent='Failed to load updates.'; }
}

async function trackView(uid){
  var k='v_'+uid;
  if(localStorage.getItem(k)) return;
  localStorage.setItem(k,'1');
  try{
    var r=await sb.from('updates').select('views').eq('id',uid).single();
    var nv=(r.data&&r.data.views?r.data.views:0)+1;
    await sb.from('updates').update({views:nv}).eq('id',uid);
    var el=document.getElementById('vc-'+uid); if(el) el.textContent=nv;
  }catch(e){}
}

loadUpdates();
</script>
</body>
</html>
