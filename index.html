:root{--g:#25D366;--dg:#128C7E;--hdr:#075E54;--bg:#ECE5DD;--txt:#111;--sub:#667781;--bdr:#E9EDEF;}

.umeta{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,.1);}
.ubadge{background:rgba(37,211,102,.8);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;flex-shrink:0;backdrop-filter:blur(4px);}
.uauthor{font-size:12px;font-weight:600;color:rgba(150,255,200,.9);}
.udot{color:rgba(255,255,255,.3);font-size:12px;}
.uphone{font-size:11px;color:rgba(255,255,255,.45);}
.utime{font-size:11px;color:rgba(255,255,255,.5);margin-left:auto;flex-shrink:0;}
.utxt{font-size:14px;color:rgba(255,255,255,.95);line-height:1.55;}
.uimg{width:100%;border-radius:12px;margin-top:10px;max-height:320px;object-fit:contain;background:rgba(0,0,0,.2);cursor:pointer;display:block;border:1px solid rgba(255,255,255,.1);}
.uviews{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.08);}
.uviews svg{width:13px;height:13px;fill:rgba(255,255,255,.4);}
.uviews span{font-size:11px;color:rgba(255,255,255,.4);}
#no-upd{text-align:center;padding:60px 20px;color:rgba(255,255,255,.6);font-size:14px;}
#loading{text-align:center;padding:40px;color:rgba(255,255,255,.6);font-size:14px;}

/* TOAST */
.hinfo{flex:1;min-width:0;}
.hfollowers{display:flex;align-items:center;gap:4px;margin-top:3px;}
.hfollowers svg{width:12px;height:12px;fill:rgba(255,255,255,.7);}
.hfollowers span{font-size:11px;color:rgba(255,255,255,.65);}
.hdr-top{display:flex;align-items:center;gap:10px;background:rgba(7,94,84,.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:12px 16px;border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.18);}
.hdr-pill-bar{padding:8px 16px 0;display:flex;justify-content:center;background:transparent;}
.hwa-btn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;background:rgba(7,94,84,.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:10px 22px;border-radius:24px;transition:all .2s;box-shadow:0 8px 32px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.18);}
.hwa-btn:hover{background:rgba(255,255,255,.25);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.15);}
#toast.show{opacity:1;}

<script>
const SB_URL = 'https://gufqzzhwgrxrjwyhqnki.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZnF6emh3Z3J4cmp3eWhxbmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTk5MDAsImV4cCI6MjA5NTAzNTkwMH0.Elfpdw9TnTNT7g8yn8HFLpxcry7bjkEZTeUlOZxuhC4';
const sb = supabase.createClient(SB_URL, SB_KEY);

function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function fmtTime(d){
  var now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var yest=new Date(today-86400000), md=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(md.getTime()===today.getTime()) return t;
  if(md.getTime()===yest.getTime()) return 'Yesterday '+t;
  return d.toLocaleDateString()+' '+t;
}
function fmtSize(b){ if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2500); }

function fmtCount(n){
  if(n>=1000000) return (n/1000000).toFixed(1).replace('.0','')+'M';
  if(n>=1000) return (n/1000).toFixed(1).replace('.0','')+'k';
  return String(n);
}

async function trackFollower(){
  var k='sgd_visited';
  var el=document.getElementById('follower-count');
  try{
    var r=await sb.from('followers').select('count').eq('id',1).single();
    var current=r.data&&r.data.count?r.data.count:0;
    if(el) el.textContent=fmtCount(current)+' followers';
    // Only increment once per browser
    if(localStorage.getItem(k)) return;
    localStorage.setItem(k,'1');
    var newCount=current+1;
    await sb.from('followers').upsert({id:1,count:newCount});
    if(el) el.textContent=fmtCount(newCount)+' followers';
  }catch(e){
    if(el) el.textContent='';
  }
}

async function loadUpdates(){
  try{
    var r = await sb.from('updates').select('*').order('created_at',{ascending:false}).limit(50);
    document.getElementById('loading').style.display='none';
    var list=document.getElementById('updlist'), none=document.getElementById('no-upd');
    if(!r.data||!r.data.length){ none.style.display=''; return; }
    none.style.display='none';
    list.innerHTML = r.data.map(function(u){
      return '<div class="ucard">'+
        '<div class="umeta">'+
          '<span class="ubadge">UPDATE</span>'+
          '<span class="utime">'+fmtTime(new Date(u.created_at))+'</span>'+
        '</div>'+
        '<div class="utxt">'+esc(u.text)+'</div>'+
        (u.image_url?'<img class="uimg" src="'+u.image_url+'" onclick="window.open(\''+u.image_url+'\',\'_blank\')" alt="update image">':'')+
        '<div class="uviews">'+
          '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'+
          '<span id="vc-'+u.id+'">'+(u.views||0)+'</span>'+
        '</div>'+
      '</div>';
    }).join('');
    r.data.forEach(function(u){ trackView(u.id); });
  }catch(e){ document.getElementById('loading').textContent='Failed to load updates.'; }
}

async function trackView(uid){
  var k='v_'+uid;
  if(localStorage.getItem(k)) return;
  localStorage.setItem(k,'1');
  try{
    var r=await sb.from('updates').select('views').eq('id',uid).single();
    var nv=(r.data&&r.data.views?r.data.views:0)+1;
    await sb.from('updates').update({views:nv}).eq('id',uid);
    var el=document.getElementById('vc-'+uid); if(el) el.textContent=nv;
  }catch(e){}
}

loadUpdates();
trackFollower();
</script>
