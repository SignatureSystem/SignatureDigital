/* Alert Modal */

function sanitize(t){
  if(!t) return '';
  var formatted = t.replace(/\n/g, '<br>');
  return DOMPurify.sanitize(formatted, { ALLOWED_TAGS: ['b', 'i', 'u', 's', 'strong', 'em', 'br', 'span', 'div', 'p'] });
}

function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(d){
  var now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var yest=new Date(today-86400000), md=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(md.getTime()===today.getTime()) return t;
  if(md.getTime()===yest.getTime()) return 'Yesterday '+t;
  return d.toLocaleDateString()+' '+t;
}

async function loadAlert(){
  try{
    var r=await sb.from('site_config').select('value').eq('key','alert').single();
    if(!r.data) return;
    var cfg=JSON.parse(r.data.value);
    if(!cfg.enabled||!cfg.message) return;
    if(sessionStorage.getItem('alert_seen')) return;
    document.getElementById('alert-msg').textContent=cfg.message;
    var bw=document.getElementById('alert-btn-wrap');
    var bl=document.getElementById('alert-btn-link');
    if(cfg.btn_label&&cfg.btn_url){
      bl.textContent=cfg.btn_label;
      bl.href=cfg.btn_url;
      bw.style.display='';
    }
    document.getElementById('alert-modal').classList.add('show');
  }catch(e){}
}
function closeAlert(){
  document.getElementById('alert-modal').classList.remove('show');
  sessionStorage.setItem('alert_seen','1');
}

function fmtCount(n){
  if(n>=1000000) return (n/1000000).toFixed(1).replace('.0','')+'M';
  if(n>=1000) return (n/1000).toFixed(1).replace('.0','')+'k';
  return String(n);
}

async function trackFollower(){
  var el=document.getElementById('follower-count');
  try{
    var r=await sb.from('followers').select('count').eq('id',1).single();
    var current=r.data&&r.data.count?r.data.count:0;
    if(el) el.textContent=fmtCount(current)+' followers';
  }catch(e){ if(el) el.textContent='0 followers'; }
  
  var isFollowing=localStorage.getItem('sgd_follow')==='1';
  setFollowedUI(isFollowing);
}

function setFollowedUI(followed){
  var btn=document.getElementById('follow-btn');
  var icon=document.getElementById('follow-icon');
  var txt=document.getElementById('follow-txt');
  if(!btn) return;
  if(followed){
    btn.classList.add('followed');
    txt.textContent='Following';
    icon.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="#25D366"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';

  }
}

async function toggleFollow(){
  var isFollowing=localStorage.getItem('sgd_follow')==='1';
  var action=isFollowing?'unfollow':'follow';
  
  try {
    await sb.rpc('adjust_follower', { action: action });
    
    if(action==='follow'){
      localStorage.setItem('sgd_follow','1');
      setFollowedUI(true);
    } else {
      localStorage.removeItem('sgd_follow');
      setFollowedUI(false);
    }
    trackFollower(); 
  } catch(e) {}
}

function showToast(msg) {
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function copyTextById(elId, btnId) {
  var el = document.getElementById(elId);
  var btn = document.getElementById(btnId);
  if (!el || !btn) return;
  
  var keyText = el.textContent || el.innerText;
  navigator.clipboard.writeText(keyText).then(function() {
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    showToast('Copied to clipboard!');
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    }, 2000);
  }).catch(function() {
    alert("Val: " + keyText);
  });
}

                  '<span class="giveaway-val" id="gw-email-' + u.id + '">' + esc(gw.email) + '</span>' +
                  '<button class="copy-btn" id="gw-email-btn-' + u.id + '" onclick="copyTextById(\'gw-email-' + u.id + '\', \'gw-email-btn-' + u.id + '\')" title="Copy Email">' +
                    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
                  '</button>' +
                '</div>' +
                '<div style="font-size: 10px; color: rgba(255, 255, 255, 0.45); font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">PASSWORD</div>' +
                '<div class="giveaway-val-container">' +
                  '<span class="giveaway-val" id="gw-pass-' + u.id + '">' + esc(gw.password) + '</span>' +
                  '<button class="copy-btn" id="gw-pass-btn-' + u.id + '" onclick="copyTextById(\'gw-pass-' + u.id + '\', \'gw-pass-btn-' + u.id + '\')" title="Copy Password">' +
                    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
                  '</button>' +
                '</div>' +
              '</div>';
            } else if (gw.value) {
              giveawayHtml = '<div class="giveaway-box">' +
                '<div class="giveaway-badge">🎁 Giveaway</div>' +
                (gw.label ? '<span class="giveaway-label">' + esc(gw.label) + '</span>' : '') +
                '<div class="giveaway-val-container">' +
                  '<span class="giveaway-val" id="gw-val-' + u.id + '">' + esc(gw.value) + '</span>' +
                  '<button class="copy-btn" id="gw-btn-' + u.id + '" onclick="copyGiveaway(\'' + u.id + '\')" title="Copy Credentials">' +
                    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
                  '</button>' +
                '</div>' +
              '</div>';
            }
          }
        } catch(e) {}
        // strip comment out from text
        cleanText = cleanText.replace(/<!--GIVEAWAY_JSON:(.*?)-->/g, '');
      }

      return '<div class="ucard">'+
        '<div class="umeta">'+
          '<span class="ubadge">UPDATE</span>'+
          '<span class="utime">'+fmtTime(new Date(u.created_at))+'</span>'+
        '</div>'+
        (u.image_url?'<img class="uimg" src="'+u.image_url+'" alt="">':'')+
        (cleanText?'<div class="utxt">'+sanitize(cleanText)+'</div>':'')+
        giveawayHtml +
        (u.btn_label&&u.btn_url?'<a href="'+(u.btn_url.startsWith('http')?u.btn_url:'https://'+u.btn_url)+'" target="_blank" class="upd-btn">'+esc(u.btn_label)+'</a>':'')+
        '<div class="uviews">'+
          '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'+
          '<span id="vc-'+u.id+'">'+(u.views||0)+'</span>'+
        '</div>'+
      '</div>';
    }).join('');
    
    r.data.forEach(function(u){ trackView(u.id); });
  }catch(e){ document.getElementById('loading').textContent='Failed to load updates.'; }
}

async function trackView(uid){
  var k='v_'+uid;
  if(localStorage.getItem(k)) return;
  localStorage.setItem(k,'1');
  try{
    await sb.rpc('increment_view_count', { update_id: uid });
    var el=document.getElementById('vc-'+uid); 
    if(el) el.textContent = parseInt(el.textContent) + 1;
  }catch(e){}
}

loadUpdates();
loadAlert();
trackFollower();
</script>
