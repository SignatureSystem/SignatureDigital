.hname{font-size:16px;font-weight:600;color:#fff;}
.hsub{font-size:12px;color:rgba(255,255,255,.65);}

.utxt{font-size:14px;color:rgba(255,255,255,.95);line-height:1.55;white-space:pre-wrap;word-wrap:break-word;}
.uimg{width:100%;border-radius:12px;margin-bottom:10px;max-height:320px;object-fit:contain;background:rgba(0,0,0,.15);display:block;border:1px solid rgba(255,255,255,.1);pointer-events:none;user-select:none;}

/* Alert Modal */

.alert-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:15px;line-height:1;transition:background .2s;}
.alert-close:hover{background:rgba(255,255,255,.25);}
.alert-msg{font-size:14px;color:rgba(255,255,255,.95);line-height:1.6;margin-bottom:16px;padding-right:20px;white-space:pre-wrap;}

.upd-btn{display:inline-flex;align-items:center;justify-content:center;margin-top:10px;padding:10px 22px;background:rgba(37,211,102,.3);backdrop-filter:blur(24px);border:1px solid rgba(37,211,102,.5);border-radius:24px;color:#fff;font-size:13px;font-weight:600;text-decoration:none;}
.uviews{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.08);}
.uviews svg{width:13px;height:13px;fill:rgba(255,255,255,.4);}
.uviews span{font-size:11px;color:rgba(255,255,255,.4);}
#no-upd, #loading{text-align:center;padding:40px;color:rgba(255,255,255,.6);font-size:14px;}

.u-emoji-btn {

const MINI_LIKE_SVG = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>';

var activeStateCounts = {};
var reactTimers = {};
var hoverTimers = {};
var currentOpenPopupId = null;
var popupOpenedAt = {};

var pressTimer = null;
var longPressTriggered = false;
var isTouchDevice = false;
var activeBreakdownId = null;

function handleReactTouchStart(e, uid) {
  isTouchDevice = true;
  longPressTriggered = false;
  if (pressTimer) clearTimeout(pressTimer);
  
  pressTimer = setTimeout(function() {
    showReactPopup(uid);
    longPressTriggered = true;
  }, 400);
}

function handleReactTouchEnd(e, uid) {
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
  if (longPressTriggered) {
    e.preventDefault();
    return;
  }
  e.preventDefault();
  toggleReactDefault(uid);
}

function handleReactMouseDown(e, uid) {
  if (isTouchDevice) return;
  longPressTriggered = false;
  if (pressTimer) clearTimeout(pressTimer);
  
  pressTimer = setTimeout(function() {
    showReactPopup(uid);
    longPressTriggered = true;
  }, 400);
}

function handleReactMouseUp(e, uid) {
  if (isTouchDevice) return;
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
}

function handleReactMouseLeave(e, uid) {
  if (isTouchDevice) return;
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
  endReactHover(uid);
}

function handleReactClick(e, uid) {
  if (isTouchDevice) return;
  if (longPressTriggered) {
    e.preventDefault();
    return;
  }
  toggleReactDefault(uid);
}

function startReactHover(uid) {
  if (isTouchDevice) return;
  if (hoverTimers[uid]) clearTimeout(hoverTimers[uid]);
  hoverTimers[uid] = setTimeout(function() {
    showReactPopup(uid);
  }, 400);
}

function endReactHover(uid) {
  if (isTouchDevice) return;
  if (hoverTimers[uid]) clearTimeout(hoverTimers[uid]);
  hoverTimers[uid] = setTimeout(function() {
    var container = document.getElementById('react-container-' + uid);
    if (container && !container.matches(':hover')) {
      hideReactPopup(uid);
    }
  }, 350);
}

function showReactPopup(uid) {
  if (currentOpenPopupId && currentOpenPopupId !== uid) {
    hideReactPopup(currentOpenPopupId);
  }
  var pop = document.getElementById('react-popup-' + uid);
  if (pop) {
    pop.classList.add('show');
    currentOpenPopupId = uid;
    popupOpenedAt[uid] = Date.now();
  }
}

function hideReactPopup(uid) {
  var pop = document.getElementById('react-popup-' + uid);
  if (pop) {
    pop.classList.remove('show');
  }
  if (currentOpenPopupId === uid) {
    currentOpenPopupId = null;
  }
  popupOpenedAt[uid] = 0;
}

function showReactionBreakdown(uid, e) {
  if (e) {
    e.stopPropagation();
    e.preventDefault();
  }
  
  if (activeBreakdownId && activeBreakdownId !== uid) {
    var otherPop = document.getElementById('react-breakdown-' + activeBreakdownId);
    if (otherPop) otherPop.style.display = 'none';
  }
  
  var pop = document.getElementById('react-breakdown-' + uid);
  if (!pop) return;
  
  if (pop.style.display === 'flex') {
    pop.style.display = 'none';
    activeBreakdownId = null;
    return;
  }
  
  var countsObj = activeStateCounts[uid];
  if (!countsObj) return;
  
  var items = [
    { key: 'like', count: countsObj.react_like || 0, emoji: '👍', label: 'Like' },
    { key: 'love', count: countsObj.react_love || 0, emoji: '❤️', label: 'Love' },
    { key: 'haha', count: countsObj.react_haha || 0, emoji: '😆', label: 'Haha' },
    { key: 'wow', count: countsObj.react_wow || 0, emoji: '😮', label: 'Wow' },
    { key: 'sad', count: countsObj.react_sad || 0, emoji: '😢', label: 'Sad' },
    { key: 'angry', count: countsObj.react_angry || 0, emoji: '😡', label: 'Angry' }
  ];
  
  var activeItems = items.filter(function(i) { return i.count > 0; });
  if (activeItems.length === 0) return;
  
  var html = '<div style="font-weight:700;font-size:11px;color:rgba(255,255,255,.9);margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:4px;width:100%;">Reactions Breakdown</div>';
  activeItems.forEach(function(item) {
    var itemEmoji = item.emoji;
    if (item.key === 'like') {
      itemEmoji = '<span style="display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);width:16px;height:16px;border-radius:50%;margin-right:2px;border:1px solid rgba(255,255,255,0.25);">' + MINI_LIKE_SVG + '</span>';
    } else {
      itemEmoji = '<span>' + item.emoji + '</span>';
    }
    html += '<div style="display:flex;align-items:center;justify-content:space-between;width:100%;font-size:12px;color:rgba(255,255,255,.9);padding:3px 0;">' +
              '<span style="display:flex;align-items:center;gap:6px;">' + itemEmoji + ' <span>' + item.label + '</span></span>' +
              '<span style="font-weight:700;color:#25D366;">' + fmtCount(item.count) + '</span>' +
            '</div>';
  });
  
  pop.innerHTML = html;
  pop.style.display = 'flex';
  activeBreakdownId = uid;
}

document.addEventListener('click', function(e) {
  if (currentOpenPopupId) {
    var container = document.getElementById('react-container-' + currentOpenPopupId);
    if (container && !container.contains(e.target)) {
      hideReactPopup(currentOpenPopupId);
    }
  }
  if (activeBreakdownId) {
    var pop = document.getElementById('react-breakdown-' + activeBreakdownId);
    var countsEl = document.getElementById('react-counts-' + activeBreakdownId);
    if (pop && !pop.contains(e.target) && countsEl && !countsEl.contains(e.target)) {
      pop.style.display = 'none';
      activeBreakdownId = null;
    }
  }
});

function updateReactBtnUI(uid, type) {
  var btn = document.getElementById('react-btn-' + uid);
  var icon = document.getElementById('react-icon-' + uid);
  var lbl = document.getElementById('react-lbl-' + uid);
  if (!btn || !icon || !lbl) return;
  
  btn.className = 'u-react-btn';
  
  if (type && REACT_MAP[type]) {
    var match = REACT_MAP[type];
    if (type === 'like') {
      icon.innerHTML = LIKE_SVG;
    } else {

    }

function renderCountsUI(uid) {
  var countsObj = activeStateCounts[uid];
  if (!countsObj) return;
  
  var total = 0;
  var items = [
    { type: 'like', count: countsObj.react_like || 0, emoji: '👍' },
    { type: 'love', count: countsObj.react_love || 0, emoji: '❤️' },
    { type: 'haha', count: countsObj.react_haha || 0, emoji: '😆' },
    { type: 'wow', count: countsObj.react_wow || 0, emoji: '😮' },
    { type: 'sad', count: countsObj.react_sad || 0, emoji: '😢' },
    { type: 'angry', count: countsObj.react_angry || 0, emoji: '😡' }
  ];
  
  items.forEach(function(item) {
    total += item.count;
  });
  
  var countsEl = document.getElementById('react-counts-' + uid);
  if (!countsEl) return;
  
  if (total === 0) {
    countsEl.style.display = 'none';
    return;
  }
  
  var activeItems = items.filter(function(i) { return i.count > 0; });
  activeItems.sort(function(a, b) { return b.count - a.count; });
  
  var topEmojisHtml = '<div class="u-react-emoji-icons">';
  var displayCount = Math.min(3, activeItems.length);
  for (var i = 0; i < displayCount; i++) {
    if (activeItems[i].type === 'like') {
      topEmojisHtml += '<span style="display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);width:16px;height:16px;border-radius:50%;margin-right:2px;border:1px solid rgba(255,255,255,0.25);">' + MINI_LIKE_SVG + '</span>';
    } else {
      topEmojisHtml += '<span>' + activeItems[i].emoji + '</span>';
    }
  }
  topEmojisHtml += '</div>';
  
  countsEl.innerHTML = topEmojisHtml + '<span class="u-react-total-num">' + fmtCount(total) + '</span>';
  countsEl.style.display = 'flex';
}

async function toggleReactDefault(uid) {
  var openedTime = popupOpenedAt[uid] || 0;
  var now = Date.now();
  if (openedTime && (now - openedTime < 450)) {
    return;
  }
  
  var pop = document.getElementById('react-popup-' + uid);
  if (pop && pop.classList.contains('show')) {
    hideReactPopup(uid);
  }
  
  var active = localStorage.getItem('react_' + uid);
  if (active) {
    localStorage.removeItem('react_' + uid);
    updateReactBtnUI(uid, null);
    await decrementReactionOnServer(uid, active);
  } else {
    localStorage.setItem('react_' + uid, 'like');
    updateReactBtnUI(uid, 'like');
    await incrementReactionOnServer(uid, 'like');
  }
}

async function selectReaction(uid, emojiKey) {
  hideReactPopup(uid);
  
  var prevReaction = localStorage.getItem('react_' + uid) || null;
  if (prevReaction === emojiKey) {
    localStorage.removeItem('react_' + uid);
    updateReactBtnUI(uid, null);
    await decrementReactionOnServer(uid, emojiKey);
    return;
  }
  
  if (prevReaction) {
    await decrementReactionOnServer(uid, prevReaction);
  }
  
  localStorage.setItem('react_' + uid, emojiKey);
  updateReactBtnUI(uid, emojiKey);
  await incrementReactionOnServer(uid, emojiKey);
}

async function incrementReactionOnServer(uid, type) {
  try {
    var r = await sb.rpc('react_to_post', { update_id: uid, reaction: type, val: 1 });
    if (r.error) throw r.error;
  } catch (err) {
    console.warn("RPC react_to_post failed, falling back to direct update:", err);
    try {
      var currentVal = activeStateCounts[uid] ? (activeStateCounts[uid]['react_' + type] || 0) : 0;
      var updateData = {};
      updateData['react_' + type] = currentVal + 1;
      await sb.from('updates').update(updateData).eq('id', uid);
    } catch (e) {
      console.error("Direct update fallback failed too:", e);
    }
  }
  if (activeStateCounts[uid]) {
    activeStateCounts[uid]['react_' + type] = (activeStateCounts[uid]['react_' + type] || 0) + 1;
    renderCountsUI(uid);
  }
}

async function decrementReactionOnServer(uid, type) {
  try {
    var r = await sb.rpc('react_to_post', { update_id: uid, reaction: type, val: -1 });
    if (r.error) throw r.error;
  } catch (err) {
    console.warn("RPC react_to_post failed, falling back to direct update:", err);
    try {
      var currentVal = activeStateCounts[uid] ? (activeStateCounts[uid]['react_' + type] || 0) : 0;
      var updateData = {};
      updateData['react_' + type] = Math.max(0, currentVal - 1);
      await sb.from('updates').update(updateData).eq('id', uid);
    } catch (e) {
      console.error("Direct update fallback failed too:", e);
    }
  }
  if (activeStateCounts[uid]) {
    activeStateCounts[uid]['react_' + type] = Math.max(0, (activeStateCounts[uid]['react_' + type] || 0) - 1);
    renderCountsUI(uid);
  }
}

function sanitize(t){
  if(!t) return '';
  var formatted = t.replace(/\n/g, '<br>');
  return DOMPurify.sanitize(formatted, { ALLOWED_TAGS: ['b', 'i', 'u', 's', 'strong', 'em', 'br', 'span', 'div', 'p'] });
}

function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(d){
  var now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var yest=new Date(today-86400000), md=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(md.getTime()===today.getTime()) return t;
  if(md.getTime()===yest.getTime()) return 'Yesterday '+t;
  return d.toLocaleDateString()+' '+t;
}

function fmtCount(n){
  if(n>=1000000) return (n/1000000).toFixed(1).replace('.0','')+'M';
  if(n>=1000) return (n/1000).toFixed(1).replace('.0','')+'k';
  return String(n);
}

  navigator.clipboard.writeText(keyText).then(function() {
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

                  '</button>' +

              '</div>';
            } else if (gw.type === 'account' || (gw.email && gw.password)) {
              giveawayHtml = '<div class="giveaway-box">' +
                '<div class="giveaway-badge">🎁 Giveaway Account</div>' +
                (gw.label ? '<span class="giveaway-label">' + esc(gw.label) + '</span>' : '') +

                '<div class="giveaway-val-container" style="margin-bottom: 8px;">' +
                  '<span class="giveaway-val" id="gw-email-' + u.id + '">' + esc(gw.email) + '</span>' +
                  '<button class="copy-btn" id="gw-email-btn-' + u.id + '" onclick="copyTextById(\'gw-email-' + u.id + '\', \'gw-email-btn-' + u.id + '\')" title="Copy Email">' +
                    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +

                '</div>' +
                '<div style="font-size: 10px; color: rgba(255, 255, 255, 0.45); font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">PASSWORD</div>' +

                    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
                  '</button>' +
                '</div>' +
              '</div>';
            } else if (gw.value) {
              giveawayHtml = '<div class="giveaway-box">' +
                '<div class="giveaway-badge">🎁 Giveaway</div>' +
                (gw.label ? '<span class="giveaway-label">' + esc(gw.label) + '</span>' : '') +
                '<div class="giveaway-val-container">' +
                  '<span class="giveaway-val" id="gw-val-' + u.id + '">' + esc(gw.value) + '</span>' +
                  '<button class="copy-btn" id="gw-btn-' + u.id + '" onclick="copyGiveaway(\'' + u.id + '\')" title="Copy Credentials">' +
                    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
                  '</button>' +

              '</div>';
            }
          }
        } catch(e) {}
        // strip comment out from text
        cleanText = cleanText.replace(/<!--GIVEAWAY_JSON:(.*?)-->/g, '');
      }

      // Cache counts locally for reactive state
      activeStateCounts[u.id] = {
        react_like: u.react_like || 0,
        react_love: u.react_love || 0,
        react_haha: u.react_haha || 0,
        react_wow: u.react_wow || 0,
        react_sad: u.react_sad || 0,

      return '<div class="ucard">'+

          '<span class="utime">'+fmtTime(new Date(u.created_at))+'</span>'+
        '</div>'+
        (u.image_url?'<img class="uimg" src="'+u.image_url+'" alt="">':'')+

          '<div style="display:flex;align-items:center;gap:12px;">'+
            '<div class="uviews" style="margin-top:0;padding-top:0;border-top:none;display:inline-flex;align-items:center;gap:4px;">'+
              '<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:rgba(255,255,255,.4);"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'+

            '<div class="u-react-container" id="react-container-'+u.id+'" onmouseenter="startReactHover(\''+u.id+'\')" onmouseleave="endReactHover(\''+u.id+'\')">'+
              '<button class="u-react-btn" id="react-btn-'+u.id+'" '+
                      'onmousedown="handleReactMouseDown(event, \''+u.id+'\')" '+
                      'onmouseup="handleReactMouseUp(event, \''+u.id+'\')" '+
                      'onmouseleave="handleReactMouseLeave(event, \''+u.id+'\')" '+
                      'ontouchstart="handleReactTouchStart(event, \''+u.id+'\')" '+
                      'ontouchend="handleReactTouchEnd(event, \''+u.id+'\')" '+
                      'oncontextmenu="event.preventDefault()" '+
                      'onclick="handleReactClick(event, \''+u.id+'\')">'+

                '<span class="react-btn-text" id="react-lbl-'+u.id+'">Like</span>'+
              '</button>'+
              '<div class="u-react-popup" id="react-popup-'+u.id+'">'+
                '<button class="u-emoji-btn" onclick="selectReaction(\''+u.id+'\', \'like\')" title="Like" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;">'+
                  '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>'+
                '</button>'+
                '<button class="u-emoji-btn" onclick="selectReaction(\''+u.id+'\', \'love\')" title="Love">❤️</button>'+
                '<button class="u-emoji-btn" onclick="selectReaction(\''+u.id+'\', \'haha\')" title="Haha">😆</button>'+
                '<button class="u-emoji-btn" onclick="selectReaction(\''+u.id+'\', \'wow\')" title="Wow">😮</button>'+
                '<button class="u-emoji-btn" onclick="selectReaction(\''+u.id+'\', \'sad\')" title="Sad">😢</button>'+
                '<button class="u-emoji-btn" onclick="selectReaction(\''+u.id+'\', \'angry\')" title="Angry">😡</button>'+
              '</div>'+
              '<div class="u-react-counts" id="react-counts-'+u.id+'" onclick="showReactionBreakdown(\''+u.id+'\', event)"></div>' +
              '<div class="u-react-breakdown-pop" id="react-breakdown-'+u.id+'"></div>'+
            '</div>'+
          '</div>'+
          (u.btn_label&&u.btn_url?'<a href="'+(u.btn_url.startsWith('http')?u.btn_url:'https://'+u.btn_url)+'" target="_blank" class="upd-btn" style="margin-top:0;padding:6px 16px;font-size:12px;border-radius:16px;margin-left:auto;">'+esc(u.btn_label)+'</a>':'')+
        '</div>'+
      '</div>';
    }).join('');
    
    r.data.forEach(function(u){
      renderCountsUI(u.id);
      var userReactedKey = localStorage.getItem('react_' + u.id);
      if (userReactedKey) {
        updateReactBtnUI(u.id, userReactedKey);
      }
      trackView(u.id);
    });
  }catch(e){ document.getElementById('loading').textContent='Failed to load updates.'; }
}

const viewedInThisLoad = new Set();

async function trackView(uid){
  var cleanId = parseInt(uid, 10);
  if (isNaN(cleanId)) return;
  if (viewedInThisLoad.has(cleanId)) return;
  viewedInThisLoad.add(cleanId);
  
  try{
    var r = await sb.rpc('increment_view_count', { update_id: cleanId });
    if(r && r.error) throw r.error;
    var el=document.getElementById('vc-'+uid); 
    if(el) el.textContent = (parseInt(el.textContent) || 0) + 1;
  }catch(e){
    console.warn("RPC increment_view_count failed, falling back to direct update:", e);
    try{
      var el=document.getElementById('vc-'+uid);
      var currentVal = el ? (parseInt(el.textContent) || 0) : 0;
      var rFall = await sb.from('updates').update({ views: currentVal + 1 }).eq('id', cleanId);
      if(rFall && rFall.error) throw rFall.error;
      if(el) el.textContent = currentVal + 1;
    }catch(err){
      console.error("Fallback view update failed too:", err);
    }
  }
}
